<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="stick1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="30%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Stars / sparkles -->
  <circle cx="50" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="150" cy="30" r="1" fill="white" opacity="0.4"/>
  <circle cx="320" cy="70" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="370" cy="150" r="1" fill="white" opacity="0.4"/>
  <circle cx="80" cy="350" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="340" cy="330" r="1" fill="white" opacity="0.4"/>
  <!-- Incense sticks bundle -->
  <rect x="188" y="120" width="4" height="220" rx="2" fill="url(#stick1)"/>
  <rect x="198" y="100" width="4" height="240" rx="2" fill="url(#stick1)" transform="rotate(-5 200 200)"/>
  <rect x="178" y="130" width="4" height="210" rx="2" fill="url(#stick1)" transform="rotate(5 200 200)"/>
  <rect x="208" y="110" width="4" height="230" rx="2" fill="url(#stick1)" transform="rotate(-10 200 200)"/>
  <rect x="168" y="140" width="4" height="200" rx="2" fill="url(#stick1)" transform="rotate(10 200 200)"/>
  <!-- Glowing tips -->
  <circle cx="190" cy="120" r="4" fill="#FCD34D" opacity="0.9"/>
  <circle cx="200" cy="100" r="4" fill="#FCD34D" opacity="0.9"/>
  <circle cx="180" cy="130" r="4" fill="#FCD34D" opacity="0.9"/>
  <!-- Smoke wisps -->
  <path d="M190,115 Q185,90 192,70 Q198,50 188,30" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <path d="M200,95 Q208,70 200,45 Q193,20 202,5" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <path d="M180,125 Q172,100 178,78" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Holder base -->
  <ellipse cx="195" cy="345" rx="50" ry="8" fill="#7C3AED" opacity="0.7"/>
  <rect x="165" y="335" width="60" height="14" rx="4" fill="#7C3AED" opacity="0.5"/>
  <!-- Sanskrit decorative text -->
  <text x="200" y="385" text-anchor="middle" font-size="14" fill="rgba(252,211,77,0.6)" font-family="serif">Sandalwood · Jasmine · Rose</text>
</svg>
