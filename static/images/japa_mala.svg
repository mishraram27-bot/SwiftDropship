<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </radialGradient>
    <radialGradient id="bead" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <radialGradient id="main_bead" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Mala circle of beads (108 beads simplified) -->
  <g id="mala">
    <!-- Generate beads around a circle of radius 150 centered at 200,195 -->
    <!-- Main guru bead at top -->
    <circle cx="200" cy="48" r="14" fill="url(#main_bead)"/>
    <!-- Tassel below guru bead -->
    <line x1="200" y1="62" x2="200" y2="95" stroke="#7C3AED" stroke-width="3"/>
    <line x1="193" y1="90" x2="193" y2="110" stroke="#7C3AED" stroke-width="2"/>
    <line x1="200" y1="90" x2="200" y2="112" stroke="#7C3AED" stroke-width="2"/>
    <line x1="207" y1="90" x2="207" y2="110" stroke="#7C3AED" stroke-width="2"/>
  </g>
  <!-- Beads around the ring (simplified - 24 beads shown) -->
  <circle cx="200" cy="65" r="9" fill="url(#bead)"/>
  <circle cx="240" cy="72" r="9" fill="url(#bead)"/>
  <circle cx="274" cy="92" r="9" fill="url(#bead)"/>
  <circle cx="300" cy="120" r="9" fill="url(#bead)"/>
  <circle cx="316" cy="154" r="9" fill="url(#bead)"/>
  <circle cx="322" cy="192" r="9" fill="url(#bead)"/>
  <circle cx="316" cy="230" r="9" fill="url(#bead)"/>
  <circle cx="300" cy="264" r="9" fill="url(#bead)"/>
  <circle cx="274" cy="292" r="9" fill="url(#bead)"/>
  <circle cx="240" cy="312" r="9" fill="url(#bead)"/>
  <circle cx="200" cy="322" r="9" fill="url(#bead)"/>
  <circle cx="160" cy="312" r="9" fill="url(#bead)"/>
  <circle cx="126" cy="292" r="9" fill="url(#bead)"/>
  <circle cx="100" cy="264" r="9" fill="url(#bead)"/>
  <circle cx="84" cy="230" r="9" fill="url(#bead)"/>
  <circle cx="78" cy="192" r="9" fill="url(#bead)"/>
  <circle cx="84" cy="154" r="9" fill="url(#bead)"/>
  <circle cx="100" cy="120" r="9" fill="url(#bead)"/>
  <circle cx="126" cy="92" r="9" fill="url(#bead)"/>
  <circle cx="160" cy="72" r="9" fill="url(#bead)"/>
  <!-- Thread connecting -->
  <circle cx="200" cy="192" r="120" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="2,15" opacity="0.4"/>
  <!-- Center Om -->
  <text x="200" y="205" text-anchor="middle" font-size="42" fill="#7C3AED" font-family="serif" opacity="0.6">ॐ</text>
  <text x="200" y="380" text-anchor="middle" font-size="12" fill="#7C3AED" font-family="sans-serif">108 Sandalwood Beads · Handmade</text>
</svg>
