<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Power bank body -->
  <rect x="100" y="110" width="200" height="180" rx="20" fill="url(#body)"/>
  <!-- Highlight -->
  <rect x="100" y="110" width="200" height="30" rx="20" fill="rgba(255,255,255,0.07)"/>
  <rect x="110" y="120" width="180" height="2" rx="1" fill="rgba(255,255,255,0.12)"/>
  <!-- Battery level bars -->
  <rect x="125" y="165" width="150" height="14" rx="7" fill="#0F172A"/>
  <rect x="128" y="168" width="108" height="8" rx="4" fill="url(#bar)"/>
  <!-- LED dots -->
  <circle cx="145" cy="200" r="6" fill="#22C55E" opacity="0.9"/>
  <circle cx="165" cy="200" r="6" fill="#22C55E" opacity="0.7"/>
  <circle cx="185" cy="200" r="6" fill="#22C55E" opacity="0.5"/>
  <circle cx="205" cy="200" r="6" fill="#64748B" opacity="0.4"/>
  <!-- USB ports -->
  <rect x="130" y="240" width="45" height="22" rx="4" fill="#0F172A"/>
  <rect x="133" y="243" width="39" height="16" rx="3" fill="#1E293B"/>
  <text x="153" y="256" text-anchor="middle" font-size="7" fill="#94A3B8">USB-C</text>
  <rect x="185" y="240" width="45" height="22" rx="4" fill="#0F172A"/>
  <rect x="188" y="243" width="39" height="16" rx="3" fill="#1E293B"/>
  <text x="208" y="256" text-anchor="middle" font-size="8" fill="#94A3B8">USB-A</text>
  <!-- Power button -->
  <circle cx="280" cy="200" r="16" fill="#0F172A"/>
  <circle cx="280" cy="200" r="12" fill="#1E293B"/>
  <path d="M280,193 L280,200 M276,195 Q272,200 276,206 Q280,210 284,206 Q288,200 284,195" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round"/>
  <!-- Lightning bolt -->
  <text x="200" y="100" text-anchor="middle" font-size="22" fill="#FCD34D">⚡ 20000mAh</text>
  <!-- Brand text -->
  <text x="200" y="145" text-anchor="middle" font-size="11" fill="#94A3B8" letter-spacing="3">POWERTECH</text>
  <!-- Cable decorative -->
  <path d="M200,295 Q200,330 200,360" stroke="#475569" stroke-width="6" fill="none" stroke-linecap="round"/>
  <rect x="188" y="355" width="24" height="10" rx="3" fill="#475569"/>
  <text x="200" y="390" text-anchor="middle" font-size="12" fill="#64748B">Fast Charging · Multi-Port</text>
</svg>
